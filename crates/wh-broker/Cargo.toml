[package]
name = "wh-broker"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Wheelhouse message broker — ZMQ XPUB/XSUB routing and stream persistence"

[[bin]]
name = "wh-broker"
path = "src/main.rs"

[dependencies]
wh-proto = { workspace = true }
tokio = { workspace = true, features = ["full"] }
