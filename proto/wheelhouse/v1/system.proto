syntax = "proto3";

package wheelhouse.v1;

import "google/protobuf/timestamp.proto";

// CronEvent is published by the broker's embedded cron scheduler when a cron job fires.
// Broker-internal only (RT-01): external publish attempts are dropped.
message CronEvent {
  string job_name = 1;
  string action = 2;
  string schedule = 3;
  google.protobuf.Timestamp triggered_at = 4;
  map<string, string> payload = 5;
}
