syntax = "proto3";

package wheelhouse.v1;

import "google/protobuf/timestamp.proto";

// CronEvent — published by the broker's embedded cron scheduler to a target
// stream when a cron job fires (ADR-012).
// System type (RT-01): broker-internal only, external publish attempts are dropped.
message CronEvent {
  // Name of the cron job as declared in the .wh file
  string job_name = 1;
  // Action type: "compact" or "event"
  string action = 2;
  // The cron schedule expression that triggered this event
  string schedule = 3;
  // UTC timestamp when the cron job fired
  google.protobuf.Timestamp triggered_at = 4;
  // Optional payload declared in the .wh file cron section
  map<string, string> payload = 5;

  // Reserved for future evolution (TT-02)
  reserved 50 to 100;
}

// TopologyShutdown — system event published before clean topology stop (CM-01).
// Note: user-facing name avoids "broker" terminology.
message TopologyShutdown {
  string reason = 1;
  int64 timestamp_ms = 2;

  // Reserved for future evolution (TT-02)
  reserved 50 to 100;
}

// StreamCapacityWarning — emitted when WAL approaches max_wal_size_bytes (FM-11, PP-08).
message StreamCapacityWarning {
  string stream_name = 1;
  uint64 current_size_bytes = 2;
  uint64 max_size_bytes = 3;
  float usage_percent = 4;
  int64 timestamp_ms = 5;

  // Reserved for future evolution (TT-02)
  reserved 50 to 100;
}
