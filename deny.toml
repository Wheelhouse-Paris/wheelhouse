# cargo-deny configuration for Wheelhouse
# https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

# Build script allowlist (SA-02)
# Note: cargo-deny's build script auditing is configured via
# the [bans] section. The build scripts for prost-build and
# protoc-bin-vendored are reviewed and accepted.
# When cargo-deny adds native build-script allowlist support,
# migrate to that mechanism.
