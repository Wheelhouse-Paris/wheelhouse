name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Gate: proto-check must pass before anything else
  # ──────────────────────────────────────────────
  proto-check:
    name: Proto Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.1"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Verify proto hashes
        run: |
          COMPUTED=$(find proto -name '*.proto' -print0 | sort -z | xargs -0 shasum -a 256 | shasum -a 256 | cut -d' ' -f1)
          EXPECTED=$(cat .proto.sha256)
          if [ "$COMPUTED" != "$EXPECTED" ]; then
            echo "FAIL: Proto file hashes do not match."
            echo "  Expected: $EXPECTED"
            echo "  Computed: $COMPUTED"
            echo "Run 'make proto-hash' and commit .proto.sha256"
            exit 1
          fi
          echo "OK: Proto hashes match."

      - name: Verify proto fixtures exist
        run: |
          if [ ! -d "tests/fixtures/proto" ] || [ -z "$(ls tests/fixtures/proto/*.bin 2>/dev/null)" ]; then
            echo "FAIL: Proto fixture files missing (NFR-E1)."
            exit 1
          fi
          echo "OK: Proto fixtures present."

      - name: Run backward-compat tests
        run: cargo test -p wh-proto --test proto_compat

  # ──────────────────────────────────────────────
  # Path filter for conditional job execution
  # ──────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      proto: ${{ steps.filter.outputs.proto }}
      agent_claude: ${{ steps.filter.outputs.agent_claude }}
      broker: ${{ steps.filter.outputs.broker }}
      telegram: ${{ steps.filter.outputs.telegram }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'proto/**'
            python:
              - 'sdk/python/**'
              - 'proto/**'
            proto:
              - 'proto/**'
              - '.proto.sha256'
            agent_claude:
              - 'agent-claude/**'
              - 'sdk/python/**'
            broker:
              - 'crates/wh-broker/**'
              - 'crates/wh-proto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            telegram:
              - 'crates/wh-telegram/**'
              - 'crates/wh-proto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ──────────────────────────────────────────────
  # Rust: cargo test + clippy + fmt
  # Skips on python-only PRs (SR-03)
  # ──────────────────────────────────────────────
  rust:
    name: Rust
    needs: [proto-check, changes]
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.1"
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install podman
        run: sudo apt-get update -qq && sudo apt-get install -y podman

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  # ──────────────────────────────────────────────
  # Python: SDK tests
  # Skips on rust-only PRs (SR-03)
  # ──────────────────────────────────────────────
  python:
    name: Python
    needs: [proto-check, changes]
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: sdk/python
        run: uv sync --extra dev

      - name: Run tests
        working-directory: sdk/python
        run: uv run pytest

  # ──────────────────────────────────────────────
  # E2E: integration tests (runs on main + cross-boundary PRs)
  # ──────────────────────────────────────────────
  e2e:
    name: E2E
    needs: [rust, python]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.1"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release -p wh-cli -p wh-broker

      - name: Run stream E2E tests
        run: |
          export WH=./target/release/wh
          export WH_BROKER=./target/release/wh-broker
          bash tests/e2e/stream_roundtrip.sh

  # ──────────────────────────────────────────────
  # agent-claude: Docker build verification (no push)
  # Skips when agent-claude/ is untouched (SR-03)
  # ──────────────────────────────────────────────
  build-agent-claude-image:
    name: Build agent-claude Image (CI)
    needs: [changes]
    if: needs.changes.outputs.agent_claude == 'true' && github.ref != 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent-claude/Dockerfile
          push: false
          load: true
          tags: agent-claude:ci
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=ci-${{ github.sha }}

  # ──────────────────────────────────────────────
  # agent-claude: Build and push :dev tag to GHCR
  # Runs on push to dev branch when agent-claude/ changes
  # ──────────────────────────────────────────────
  publish-agent-claude-dev:
    name: Publish agent-claude Image (dev)
    needs: [changes]
    if: needs.changes.outputs.agent_claude == 'true' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent-claude/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/wheelhouse-paris/agent-claude:dev
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=dev-${{ github.sha }}

  # ──────────────────────────────────────────────
  # wh-broker: Docker build verification (no push)
  # ──────────────────────────────────────────────
  build-broker-image:
    name: Build wh-broker Image (CI)
    needs: [changes]
    if: needs.changes.outputs.broker == 'true' && github.ref != 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/wh-broker/Dockerfile
          push: false
          load: true
          tags: wh-broker:ci

  # ──────────────────────────────────────────────
  # wh-broker: Build and push :dev tag to GHCR
  # ──────────────────────────────────────────────
  publish-broker-dev:
    name: Publish wh-broker Image (dev)
    needs: [changes]
    if: needs.changes.outputs.broker == 'true' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/wh-broker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/wheelhouse-paris/wh-broker:dev

  # ──────────────────────────────────────────────
  # wh-telegram: Docker build verification (no push)
  # ──────────────────────────────────────────────
  build-telegram-image:
    name: Build wh-telegram Image (CI)
    needs: [changes]
    if: needs.changes.outputs.telegram == 'true' && github.ref != 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/wh-telegram/Dockerfile
          push: false
          load: true
          tags: wh-telegram:ci

  # ──────────────────────────────────────────────
  # wh-telegram: Build and push :dev tag to GHCR
  # ──────────────────────────────────────────────
  publish-telegram-dev:
    name: Publish wh-telegram Image (dev)
    needs: [changes]
    if: needs.changes.outputs.telegram == 'true' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/wh-telegram/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/wheelhouse-paris/wh-telegram:dev
