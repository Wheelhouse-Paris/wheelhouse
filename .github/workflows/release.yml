name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            bins: wh wh-broker
          - target: aarch64-apple-darwin
            runner: macos-14
            bins: wh wh-broker

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools cmake perl
          rustup target add x86_64-unknown-linux-musl

      - name: Build release binaries
        env:
          OPENSSL_VENDORED: ${{ contains(matrix.target, 'musl') && '1' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          for bin in wh wh-broker; do
            cp target/${{ matrix.target }}/release/${bin} dist/${bin}-${{ matrix.target }}
          done

      - name: Generate SLSA provenance attestation (SA-05)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  container:
    name: Build and push container image (SR-02)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binaries-x86_64-unknown-linux-musl
          path: dist

      - name: Prepare binary for Docker
        run: |
          cp dist/wh-x86_64-unknown-linux-musl wh
          chmod +x wh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wheelhouse-paris/wh-cli:${{ steps.version.outputs.version }}
            ghcr.io/wheelhouse-paris/wh-cli:latest
