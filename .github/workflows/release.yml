name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          for bin in wh wh-broker wh-telegram; do
            cp target/${{ matrix.target }}/release/${bin} dist/${bin}-${{ matrix.target }}
          done
          # Bundle all binaries in a tarball for Homebrew (named binaries at root)
          mkdir -p /tmp/wh-bundle
          cp target/${{ matrix.target }}/release/wh /tmp/wh-bundle/wh
          cp target/${{ matrix.target }}/release/wh-broker /tmp/wh-bundle/wh-broker
          cp target/${{ matrix.target }}/release/wh-telegram /tmp/wh-bundle/wh-telegram
          tar -czf dist/wh-${{ matrix.target }}.tar.gz -C /tmp/wh-bundle wh wh-broker wh-telegram

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_BARE="${VERSION#v}"
          SHA256=$(sha256sum dist/wh-aarch64-apple-darwin.tar.gz | awk '{print $1}')

          # Fetch current formula from tap repo
          API="https://api.github.com/repos/Wheelhouse-Paris/homebrew-tap/contents/Formula/wh.rb"
          RESPONSE=$(curl -fsSL -H "Authorization: Bearer $TAP_TOKEN" -H "Accept: application/vnd.github+json" "$API")
          SHA_FILE=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          CONTENT=$(echo "$RESPONSE" | python3 -c "import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode())")

          # Update version, url (.tar.gz), and sha256
          UPDATED=$(echo "$CONTENT" \
            | sed "s|version \".*\"|version \"$VERSION_BARE\"|" \
            | sed "s|releases/download/v[^/]*/wh-aarch64-apple-darwin\.tar\.gz|releases/download/$VERSION/wh-aarch64-apple-darwin.tar.gz|" \
            | sed "s|sha256 \".*\"|sha256 \"$SHA256\"|")

          # Push updated formula
          ENCODED=$(echo "$UPDATED" | base64 -w0)
          curl -fsSL -X PUT "$API" \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"message\":\"chore: bump wh to $VERSION_BARE\",\"content\":\"$ENCODED\",\"sha\":\"$SHA_FILE\"}"

  # ──────────────────────────────────────────────
  # agent-claude container image (ADR-019)
  # Runs in parallel with build/release jobs
  # ──────────────────────────────────────────────
  build-agent-claude-image:
    name: Build agent-claude Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: agent-claude/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/wheelhouse-paris/agent-claude:${{ github.ref_name }}
            ghcr.io/wheelhouse-paris/agent-claude:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Attest SLSA provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/wheelhouse-paris/agent-claude
          subject-digest: ${{ steps.build.outputs.digest }}
