name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          for bin in wh wh-broker; do
            cp target/${{ matrix.target }}/release/${bin} dist/${bin}-${{ matrix.target }}
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # ──────────────────────────────────────────────
  # agent-claude container image (ADR-019)
  # Runs in parallel with build/release jobs
  # ──────────────────────────────────────────────
  build-agent-claude-image:
    name: Build agent-claude Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: agent-claude/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/wheelhouse-paris/agent-claude:${{ github.ref_name }}
            ghcr.io/wheelhouse-paris/agent-claude:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Attest SLSA provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/wheelhouse-paris/agent-claude
          subject-digest: ${{ steps.build.outputs.digest }}
